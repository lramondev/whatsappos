<div class="profile">
  <div class="big">
    <mat-card>

    </mat-card>
  </div>
  <div class="medium">
    <mat-card>
      
    </mat-card>
  </div>
  <div class="small">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Aparência</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-grid-list cols="1" rowHeight="76px" gutterSize="8px">
      
          <mat-grid-tile>

            <mat-form-field>
              <mat-label>Tema</mat-label>
              <mat-select [value]="theme" (selectionChange)="changeTheme($event.value)">
                @for(theme of themes; track theme.name) { 
                  <mat-option [value]="theme.theme">
                    {{ theme.name }}
                  </mat-option>
                }
              </mat-select>
            </mat-form-field>

          </mat-grid-tile>
          
          <mat-grid-tile>
            <mat-slide-toggle [checked]="isDark()" (change)="toggle()"> Tema escuro</mat-slide-toggle>
          </mat-grid-tile>

        </mat-grid-list>
      </mat-card-content>
    </mat-card>
  </div>
</div>
