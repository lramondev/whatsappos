<div class="datatable">
  <mat-toolbar>

      @for(action of actions(); track action.name) { 
        <button mat-icon-button><mat-icon>{{ action.icon }}</mat-icon></button>
      }

  </mat-toolbar>
  <mat-progress-bar [mode]="isLoading() ? 'indeterminate' : 'determinate'" [value]="100"></mat-progress-bar>
  <div class="table-container scroll-container">

    <mat-table matSort [dataSource]="pageData()">

      @for(column of columns(); track column.column_def) { 

        <ng-container [matColumnDef]="column.column_def">

          <mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="column.style">
            {{ column.header }}
          </mat-header-cell>

          <mat-cell *matCellDef="let row" [ngStyle]="column.style">
            {{ 
              column.mask ? (row[column.column_def] | mask: column.mask) : row[column.column_def] 
            }}
          </mat-cell>

        </ng-container>

      }

      <mat-header-row *matHeaderRowDef="visibleColumns(); sticky: true;"></mat-header-row>
      <mat-row *matRowDef="let row; columns: visibleColumns();"></mat-row>
      
    </mat-table>

  </div>
  <mat-paginator 
    [showFirstLastButtons]="true"
    [length]="total()" 
    [pageSize]="pageSize()" 
    [pageSizeOptions]="[50, 100, 500, 1000]"
    (page)="dataSource.onPageChange($event.pageIndex, $event.pageSize)">
  </mat-paginator>
</div>
