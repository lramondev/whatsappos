<div class="form">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Certificado Digital</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="fill">
        <mat-label>Senha</mat-label>
        <input matInput type="password" [formControl]="formControl" (keypress)="keypress($event)">
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button matButton [disabled]="!formControl.valid" (click)="send()">Continuar</button>
    </mat-card-actions>
  </mat-card>
</div>
